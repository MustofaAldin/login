<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Aplikasi Pajak</title>

  <!-- Font Lexend Deca -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            lexend: ['Lexend Deca', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    .lexend-deca-body {
      font-family: "Lexend Deca", sans-serif;
    }
  </style>
</head>
<body class="lexend-deca-body bg-[#F5F7FA] dark:bg-gray-900 flex items-center justify-center min-h-screen transition-colors duration-300 relative">

  <!-- 🌗 Dark Mode Switch -->
  <div class="fixed top-4 right-4 z-50">
    <label for="dark-toggle" class="flex items-center cursor-pointer">
      <div class="relative">
        <input type="checkbox" id="dark-toggle" class="sr-only" />
        <div class="block w-14 h-8 bg-gray-300 dark:bg-gray-600 rounded-full transition-colors duration-300"></div>
        <div id="switch-knob" class="absolute top-1 left-1 w-6 h-6 bg-white rounded-full shadow-md transform transition-all duration-300 flex items-center justify-center">
          <img src="sun.png" alt="Light mode icon" class="w-4 h-4" />
        </div>
      </div>
    </label>
  </div>

  <!-- Daftar Card -->
  <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md">
    <div class="flex items-center justify-center mb-4">
      <svg class="w-8 h-8 mr-2" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="4" width="6" height="6" fill="#3361FF"/>
        <rect x="14" y="4" width="6" height="6" fill="#FF6633"/>
      </svg>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Aplikasi Pajak</h1>
    </div>
    <div class="text-center mb-6">
      <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Buat Akun Baru</h2>
      <p class="text-gray-500 dark:text-gray-300 text-sm">Silakan isi data dengan benar.</p>
    </div>
    <!-- Hanya bagian form dan script di dalam body yang diperbarui -->
<form id="registerForm" method="POST" action="register.php" class="space-y-4">
  <input type="text" name="fullname" placeholder="Nama Lengkap" required
    class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white outline-none" />

  <input type="email" name="email" placeholder="Alamat Email" required
    class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white outline-none" />

  <input type="number" name="phone" placeholder="Nomor Telepon (maks. 13 digit)" required
    maxlength="13" pattern="^\d{1,13}$"
    class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white outline-none" />

  <input type="text" name="username" placeholder="Username (huruf kecil)" required pattern="^[a-z]+$"
    class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white outline-none" />

  <!-- Password + Eye -->
  <div class="relative">
    <input type="password" name="password" id="password" placeholder="Password" required minlength="6"
      class="w-full px-4 py-3 pr-12 border border-gray-200 dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white outline-none" />
    <button type="button" onclick="togglePassword('password', this)" class="absolute right-3 top-3 text-gray-500 dark:text-gray-300">
      <svg id="eye-password" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path id="eye-open" class="block" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      </svg>
    </button>
  </div>

  <div class="relative">
    <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Konfirmasi Password" required minlength="6"
      class="w-full px-4 py-3 pr-12 border border-gray-200 dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white outline-none" />
    <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-3 top-3 text-gray-500 dark:text-gray-300">
      <svg id="eye-confirm" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path id="eye-open" class="block" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      </svg>
    </button>
  </div>

  <!-- Captcha -->
  <div class="flex items-center justify-between">
    <span class="text-lg font-bold px-4 py-2 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl" id="captchaBox">ABC123</span>
    <button type="button" onclick="generateCaptcha()" class="text-blue-600 hover:underline text-sm">Muat Ulang</button>
  </div>
  <input type="text" name="captchaInput" placeholder="Masukkan Kode Captcha" required
    class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white outline-none" />

  <button type="submit"
    class="w-full py-3 bg-blue-600 text-white font-semibold rounded-full hover:bg-blue-700 transition duration-200">
    Daftar
  </button>

  <div class="text-sm text-center text-gray-500 dark:text-gray-300">
    Sudah punya akun? <a href="index.html" class="text-blue-600 font-medium">Masuk di sini</a>
  </div>
</form>

  </div>

  <script>
    // Dark mode switch
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('dark-toggle');
      const knob = document.getElementById('switch-knob');
      const img = knob.querySelector('img');

      document.documentElement.classList.remove('dark');
      toggle.checked = false;

      function updateSwitchUI() {
        const isDark = document.documentElement.classList.contains('dark');
        if (isDark) {
          knob.classList.remove('translate-x-0');
          knob.classList.add('translate-x-6');
          img.src = 'moon.png';
          img.alt = 'Dark mode icon';
        } else {
          knob.classList.remove('translate-x-6');
          knob.classList.add('translate-x-0');
          img.src = 'sun.png';
          img.alt = 'Light mode icon';
        }
      }

      toggle.addEventListener('change', () => {
        document.documentElement.classList.toggle('dark');
        updateSwitchUI();
      });

      updateSwitchUI();
      generateCaptcha();
    });

    // Captcha generator
    function generateCaptcha() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let captcha = "";
      for (let i = 0; i < 6; i++) {
        captcha += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById('captchaBox').textContent = captcha;
    }

    // Validasi form dasar
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      const pass = this.password.value;
      const confirm = this.confirmPassword.value;
      const captcha = document.getElementById('captchaBox').textContent.trim();
      const inputCaptcha = this.captchaInput.value.trim();

      if (pass !== confirm) {
        e.preventDefault();
        alert('Password dan konfirmasi harus sama.');
        return;
      }

      if (inputCaptcha !== captcha) {
        e.preventDefault();
        alert('Kode Captcha tidak sesuai.');
        generateCaptcha();
        return;
      }
    });

    // Eye toggle untuk password
  function togglePassword(fieldId, button) {
    const input = document.getElementById(fieldId);
    const icon = button.querySelector("svg");

    if (input.type === "password") {
      input.type = "text";
      icon.innerHTML = `
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.964 9.964 0 012.091-3.368M4.271 4.271l15.458 15.458M9.878 9.878A3 3 0 0114.12 14.12" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      `;
    } else {
      input.type = "password";
      icon.innerHTML = `
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      `;
    }
  }

  function generateCaptcha() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let captcha = "";
    for (let i = 0; i < 6; i++) {
      captcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('captchaBox').textContent = captcha;
  }

  document.getElementById('registerForm').addEventListener('submit', function(e) {
    const form = this;
    const pass = form.password.value;
    const confirm = form.confirmPassword.value;
    const captcha = document.getElementById('captchaBox').textContent.trim();
    const inputCaptcha = form.captchaInput.value.trim();
    const phone = form.phone.value.trim();
    const username = form.username.value.trim();

    if (!/^\d{1,13}$/.test(phone)) {
      e.preventDefault();
      alert("Nomor telepon hanya boleh angka dan maksimal 13 digit.");
      return;
    }

    if (!/^[a-z]+$/.test(username)) {
      e.preventDefault();
      alert("Username hanya boleh huruf kecil tanpa spasi.");
      return;
    }

    if (pass !== confirm) {
      e.preventDefault();
      alert("Password dan konfirmasi tidak sama.");
      return;
    }

    if (inputCaptcha !== captcha) {
      e.preventDefault();
      alert("Kode Captcha salah.");
      generateCaptcha();
      return;
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    generateCaptcha();
  });
  </script>
</body>
</html>
